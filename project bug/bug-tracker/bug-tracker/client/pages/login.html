<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Bug Tracker</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-container">
    <h2>🐞 Bug Tracker</h2>
    <p style="color: var(--text-light); margin-top: -8px;">Log in to your account</p>
    <form id="loginForm">
      <div>
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <div>
        <label for="password">Password</label>
        <input type="password" id="password" required />
      </div>
      <p class="error-msg hidden" id="errorMsg"></p>
      <button type="submit">Log In</button>
    </form>
    <p style="margin-top: 16px; font-size: 14px;">
      Don't have an account? <a href="register.html">Sign up</a>
    </p>
  </div>

  <script src="../js/api.js"></script>
  <script>
    // Already logged in? Skip straight to projects.
    if (getToken()) window.location.href = "projects.html";

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const errorMsg = document.getElementById("errorMsg");
      errorMsg.classList.add("hidden");

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      try {
        const data = await AuthAPI.login({ email, password });
        setSession(data);
        window.location.href = "projects.html";
      } catch (err) {
        errorMsg.textContent = err.message;
        errorMsg.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
